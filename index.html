<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Zaagplanner</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8;
  --panel: #fff;
  --border: #d8d0c0;
  --accent: #c8401a;
  --accent2: #2a6e3f;
  --text: #1a1410;
  --muted: #8a7f70;
  --wood: #d4a86a;
  --wood-dark: #b8894a;
  --grid: #e8e0d0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 16px 80px;
  background-image: repeating-linear-gradient(
    0deg, transparent, transparent 39px, var(--grid) 39px, var(--grid) 40px
  ), repeating-linear-gradient(
    90deg, transparent, transparent 39px, var(--grid) 39px, var(--grid) 40px
  );
}

header {
  text-align: center;
  margin-bottom: 32px;
  width: 100%;
  max-width: 680px;
}

h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(48px, 10vw, 80px);
  letter-spacing: 6px;
  line-height: 1;
  color: var(--text);
}

h1 span { color: var(--accent); }

.subtitle {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 6px;
}

/* SECTION */
.section {
  width: 100%;
  max-width: 680px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 2px 2px 0 var(--border);
}

.section-title {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* SHEET SELECTOR */
.sheet-buttons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}

.sheet-btn {
  padding: 10px 16px;
  border: 1.5px solid var(--border);
  border-radius: 3px;
  background: var(--bg);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--text);
}

.sheet-btn:hover { border-color: var(--accent); }
.sheet-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.custom-dims {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.custom-dims input {
  width: 90px;
  padding: 8px 10px;
  border: 1.5px solid var(--border);
  border-radius: 3px;
  background: var(--bg);
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}

.custom-dims input:focus { border-color: var(--accent); }
.custom-dims .sep { color: var(--muted); font-size: 18px; }
.custom-dims label { font-size: 10px; color: var(--muted); letter-spacing: 1px; }

/* KERF */
.kerf-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 12px;
}

.kerf-row label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

.kerf-row input {
  width: 70px;
  padding: 6px 10px;
  border: 1.5px solid var(--border);
  border-radius: 3px;
  background: var(--bg);
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: var(--text);
  outline: none;
}

.kerf-row input:focus { border-color: var(--accent); }
.kerf-row span { font-size: 11px; color: var(--muted); }

/* PIECES */
.piece-row {
  display: grid;
  grid-template-columns: 1fr 80px 12px 80px 50px 36px;
  gap: 6px;
  align-items: center;
  margin-bottom: 6px;
}

.piece-row input {
  padding: 8px 10px;
  border: 1.5px solid var(--border);
  border-radius: 3px;
  background: var(--bg);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--text);
  outline: none;
  width: 100%;
}

.piece-row input:focus { border-color: var(--accent); }
.piece-row .sep { color: var(--muted); text-align: center; font-size: 16px; }

.qty-input { text-align: center; }

.del-btn {
  width: 34px;
  height: 34px;
  border: 1.5px solid var(--border);
  border-radius: 3px;
  background: var(--bg);
  color: var(--muted);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.del-btn:hover { border-color: var(--accent); color: var(--accent); background: #fff0ed; }

.col-labels {
  display: grid;
  grid-template-columns: 1fr 80px 12px 80px 50px 36px;
  gap: 6px;
  margin-bottom: 6px;
}

.col-labels span {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}

.add-btn {
  margin-top: 10px;
  padding: 10px 18px;
  border: 1.5px dashed var(--border);
  border-radius: 3px;
  background: none;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.15s;
  width: 100%;
}

.add-btn:hover { border-color: var(--accent2); color: var(--accent2); background: #f0fff4; }

/* CALCULATE BTN */
.calc-btn {
  width: 100%;
  max-width: 680px;
  padding: 16px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 4px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 4px;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 24px;
  box-shadow: 3px 3px 0 #8a2010;
}

.calc-btn:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 #8a2010; }
.calc-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 #8a2010; }

/* RESULTS */
.results { width: 100%; max-width: 680px; }

.result-header {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 3px;
  color: var(--text);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--text);
}

.sheet-plan {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 2px 2px 0 var(--border);
}

.sheet-plan h3 {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

.canvas-wrap {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

canvas {
  display: block;
  border: 1.5px solid var(--border);
  border-radius: 2px;
  max-width: 100%;
}

.legend {
  margin-top: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text);
}

.legend-swatch {
  width: 14px;
  height: 14px;
  border-radius: 2px;
  border: 1px solid rgba(0,0,0,0.2);
  flex-shrink: 0;
}

.stats-row {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.stat .val {
  font-size: 20px;
  font-weight: 500;
  color: var(--text);
}

.stat .val.good { color: var(--accent2); }
.stat .val.warn { color: var(--accent); }

.stat .lbl {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}

.error-msg {
  background: #fff0ed;
  border: 1px solid var(--accent);
  border-radius: 3px;
  padding: 10px 14px;
  font-size: 12px;
  color: var(--accent);
  margin-bottom: 12px;
}

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>

<header>
  <h1>ZAAG<span>PLAN</span></h1>
  <p class="subtitle">Plaatmateriaal optimizer</p>
</header>

<!-- SHEET SIZE -->
<div class="section">
  <div class="section-title">Plaatmaat (cm)</div>
  <div class="sheet-buttons">
    <button class="sheet-btn active" onclick="selectSheet(122,244,this)">122 × 244</button>
    <button class="sheet-btn" onclick="selectSheet(122,61,this)">122 × 61</button>
    <button class="sheet-btn" id="customBtn" onclick="selectSheet(null,null,this)">Eigen maat</button>
  </div>
  <div class="custom-dims" id="customDims" style="display:none">
    <label>B</label>
    <input type="number" id="sheetW" placeholder="122" min="1">
    <span class="sep">×</span>
    <label>H</label>
    <input type="number" id="sheetH" placeholder="244" min="1">
    <label style="margin-left:4px">cm</label>
  </div>
  <div class="kerf-row">
    <label>Zaagbreedte</label>
    <input type="number" id="kerf" value="0.3" step="0.1" min="0">
    <span>cm (bijv. 0.3 = 3mm)</span>
  </div>
</div>

<!-- PIECES -->
<div class="section">
  <div class="section-title">Benodigde stukken</div>
  <div class="col-labels">
    <span>Naam</span>
    <span>Breedte</span>
    <span></span>
    <span>Hoogte</span>
    <span>Aantal</span>
    <span></span>
  </div>
  <div id="pieceList"></div>
  <button class="add-btn" onclick="addPiece()">+ Stuk toevoegen</button>
</div>

<button class="calc-btn" onclick="calculate()">BEREKEN ZAAGPLAN</button>

<div class="results" id="results"></div>

<script>
// ── State ─────────────────────────────────────────────────────────
let sheetW = 122, sheetH = 244;
let pieces = [];
let pieceId = 0;

// Colours for pieces
const COLORS = [
  '#c8401a','#2a6e3f','#1a4a8a','#8a3a8a','#8a6a1a',
  '#1a7a7a','#8a1a4a','#4a6a1a','#3a3a8a','#6a1a1a',
  '#1a6a3a','#5a4a1a','#1a3a6a','#6a3a5a','#3a5a1a',
];

function selectSheet(w, h, btn) {
  document.querySelectorAll('.sheet-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const custom = document.getElementById('customDims');
  if (w === null) {
    custom.style.display = 'flex';
    sheetW = parseFloat(document.getElementById('sheetW').value) || 122;
    sheetH = parseFloat(document.getElementById('sheetH').value) || 244;
  } else {
    custom.style.display = 'none';
    sheetW = w; sheetH = h;
  }
}

document.getElementById('sheetW').oninput = () => { sheetW = parseFloat(document.getElementById('sheetW').value) || 122; };
document.getElementById('sheetH').oninput = () => { sheetH = parseFloat(document.getElementById('sheetH').value) || 244; };

function addPiece(name='', w='', h='', qty=1) {
  const id = pieceId++;
  pieces.push({ id, name, w, h, qty });
  renderPieces();
}

function removePiece(id) {
  pieces = pieces.filter(p => p.id !== id);
  renderPieces();
}

function renderPieces() {
  const list = document.getElementById('pieceList');
  list.innerHTML = '';
  pieces.forEach(p => {
    const row = document.createElement('div');
    row.className = 'piece-row';
    row.innerHTML = `
      <input type="text" placeholder="Naam" value="${p.name}" oninput="updatePiece(${p.id},'name',this.value)">
      <input type="number" placeholder="b" value="${p.w}" min="1" oninput="updatePiece(${p.id},'w',this.value)">
      <span class="sep">×</span>
      <input type="number" placeholder="h" value="${p.h}" min="1" oninput="updatePiece(${p.id},'h',this.value)">
      <input type="number" class="qty-input" value="${p.qty}" min="1" oninput="updatePiece(${p.id},'qty',this.value)">
      <button class="del-btn" onclick="removePiece(${p.id})">×</button>
    `;
    list.appendChild(row);
  });
}

function updatePiece(id, field, val) {
  const p = pieces.find(p => p.id === id);
  if (!p) return;
  p[field] = field === 'name' ? val : parseFloat(val) || '';
}

// ── Bin packing (guillotine algorithm) ───────────────────────────
function packSheets(items, W, H, kerf) {
  const sheets = [];

  // Sort: largest area first
  const sorted = [...items].sort((a, b) => (b.w * b.h) - (a.w * a.h));

  function tryPack(spaces, item) {
    // Try both orientations
    const orientations = [[item.w, item.h], [item.h, item.w]];
    for (const [iw, ih] of orientations) {
      for (let si = 0; si < spaces.length; si++) {
        const s = spaces[si];
        if (iw <= s.w && ih <= s.h) {
          // Place it
          const placed = { x: s.x, y: s.y, w: iw, h: ih, label: item.label, color: item.color, rotated: iw !== item.w };
          // Split remaining space (guillotine)
          const newSpaces = spaces.filter((_, i) => i !== si);
          const rightW = s.w - iw - kerf;
          const bottomH = s.h - ih - kerf;
          if (rightW > 0) newSpaces.push({ x: s.x + iw + kerf, y: s.y, w: rightW, h: ih });
          if (bottomH > 0) newSpaces.push({ x: s.x, y: s.y + ih + kerf, w: s.w, h: bottomH });
          return { placed, spaces: newSpaces };
        }
      }
    }
    return null;
  }

  let remaining = sorted.map(i => ({ ...i }));
  while (remaining.length > 0) {
    let spaces = [{ x: 0, y: 0, w: W, h: H }];
    const placed = [];
    const stillRemaining = [];
    for (const item of remaining) {
      const result = tryPack(spaces, item);
      if (result) {
        placed.push(result.placed);
        spaces = result.spaces;
      } else {
        stillRemaining.push(item);
      }
    }
    sheets.push({ placed, W, H });
    remaining = stillRemaining;
    if (remaining.length > 0 && placed.length === 0) break; // can't fit
  }
  return sheets;
}

// ── Draw canvas ───────────────────────────────────────────────────
function drawSheet(canvas, sheet, scale) {
  const ctx = canvas.getContext('2d');
  const W = sheet.W * scale;
  const H = sheet.H * scale;
  canvas.width  = W;
  canvas.height = H;

  // Wood grain background
  ctx.fillStyle = '#e8d5aa';
  ctx.fillRect(0, 0, W, H);

  // Grain lines
  ctx.strokeStyle = 'rgba(160,120,60,0.15)';
  ctx.lineWidth = 1;
  for (let y = 0; y < H; y += 4) {
    ctx.beginPath();
    ctx.moveTo(0, y + Math.sin(y * 0.3) * 2);
    ctx.lineTo(W, y + Math.sin(y * 0.3 + 2) * 2);
    ctx.stroke();
  }

  // Sheet border
  ctx.strokeStyle = '#b8894a';
  ctx.lineWidth = 2;
  ctx.strokeRect(1, 1, W - 2, H - 2);

  // Pieces
  sheet.placed.forEach(p => {
    const x = p.x * scale, y = p.y * scale;
    const w = p.w * scale, h = p.h * scale;

    // Fill
    ctx.fillStyle = p.color + 'cc';
    ctx.fillRect(x, y, w, h);

    // Border
    ctx.strokeStyle = p.color;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x, y, w, h);

    // Label
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.min(12, w * 0.18, h * 0.3)}px DM Mono, monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const label = p.rotated ? `↻ ${p.label}` : p.label;
    const lines = [label, `${p.w}×${p.h}`];
    const lh = Math.min(13, h * 0.25);
    if (h * scale > 28 && w * scale > 30) {
      lines.forEach((line, i) => {
        ctx.fillText(line, x + w/2, y + h/2 + (i - 0.5) * lh, w - 4);
      });
    }
  });

  // Dimension labels
  ctx.fillStyle = '#8a6a3a';
  ctx.font = '10px DM Mono, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(`${sheet.W} cm`, W / 2, 4);
  ctx.save();
  ctx.translate(4, H / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(`${sheet.H} cm`, 0, 0);
  ctx.restore();
}

// ── Calculate ────────────────────────────────────────────────────
function calculate() {
  const kerf = parseFloat(document.getElementById('kerf').value) || 0.3;
  const results = document.getElementById('results');
  results.innerHTML = '';

  // Validate
  if (!sheetW || !sheetH) {
    results.innerHTML = '<div class="error-msg">Voer een geldige plaatmaat in.</div>';
    return;
  }

  // Expand pieces by qty
  const items = [];
  let colorIdx = 0;
  let hasError = false;

  for (const p of pieces) {
    if (!p.w || !p.h || !p.qty) continue;
    if (p.w > sheetW && p.h > sheetW && p.w > sheetH && p.h > sheetH) {
      results.innerHTML = `<div class="error-msg">"${p.name || 'Stuk'}" (${p.w}×${p.h} cm) past niet op de plaat (${sheetW}×${sheetH} cm).</div>`;
      hasError = true; break;
    }
    const color = COLORS[colorIdx++ % COLORS.length];
    for (let i = 0; i < p.qty; i++) {
      items.push({ w: p.w, h: p.h, label: p.name || `${p.w}×${p.h}`, color });
    }
  }

  if (hasError) return;
  if (items.length === 0) {
    results.innerHTML = '<div class="error-msg">Voeg eerst stukken toe.</div>';
    return;
  }

  const sheets = packSheets(items, sheetW, sheetH, kerf);
  const totalArea = sheetW * sheetH;
  const usedArea = items.reduce((s, i) => s + i.w * i.h, 0);

  // Scale for display
  const maxW = Math.min(640, window.innerWidth - 64);
  const scale = Math.min(maxW / sheetW, 400 / sheetH);

  results.innerHTML = `<div class="result-header">ZAAGPLAN — ${sheets.length} plaat${sheets.length > 1 ? 'en' : ''}</div>`;

  sheets.forEach((sheet, idx) => {
    const sheetUsed = sheet.placed.reduce((s, p) => s + p.w * p.h, 0);
    const pct = Math.round(sheetUsed / totalArea * 100);
    const waste = Math.round((totalArea - sheetUsed) / totalArea * 100);

    const div = document.createElement('div');
    div.className = 'sheet-plan';
    div.innerHTML = `
      <h3>Plaat ${idx + 1} — ${sheetW} × ${sheetH} cm</h3>
      <div class="canvas-wrap"><canvas id="canvas${idx}"></canvas></div>
      <div class="legend" id="legend${idx}"></div>
      <div class="stats-row">
        <div class="stat"><div class="val ${pct >= 70 ? 'good' : 'warn'}">${pct}%</div><div class="lbl">Benut</div></div>
        <div class="stat"><div class="val warn">${waste}%</div><div class="lbl">Verspilling</div></div>
        <div class="stat"><div class="val">${sheet.placed.length}</div><div class="lbl">Stukken</div></div>
      </div>
    `;
    results.appendChild(div);

    const canvas = document.getElementById(`canvas${idx}`);
    drawSheet(canvas, sheet, scale);

    // Legend
    const seen = new Set();
    const legend = document.getElementById(`legend${idx}`);
    sheet.placed.forEach(p => {
      const key = p.label + p.color;
      if (seen.has(key)) return;
      seen.add(key);
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<div class="legend-swatch" style="background:${p.color}"></div><span>${p.label} (${p.w}×${p.h} cm)</span>`;
      legend.appendChild(item);
    });
  });

  results.scrollIntoView({ behavior: 'smooth' });
}

// Init with 3 empty pieces
addPiece('Zijkant', '', '', 2);
addPiece('Bodem', '', '', 1);
addPiece('', '', '', 1);
</script>
</body>
</html>
